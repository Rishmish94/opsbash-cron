name: Test and Deploy

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  # ─── Job 1: Run Playwright tests on every push and PR ─────────────────────
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps
        env:
          npm_config_legacy_peer_deps: true

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run all tests
        run: npx playwright test
        env:
          PUBLIC_GA_ID: ${{ secrets.PUBLIC_GA_ID }}

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Run JSON/YAML converter tests
        run: npm run test:yaml
        env:
          PUBLIC_GA_ID: ${{ secrets.PUBLIC_GA_ID }}

      - name: Upload JSON/YAML test report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report-yaml
          path: playwright-report/
          retention-days: 7

      - name: Run JWT Decoder tests
        run: npm run test:jwt
        env:
          PUBLIC_GA_ID: ${{ secrets.PUBLIC_GA_ID }}

      - name: Upload JWT Decoder test report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report-jwt
          path: playwright-report/
          retention-days: 7

      - name: Run chmod Calculator tests
        run: npm run test:chmod
        env:
          PUBLIC_GA_ID: ${{ secrets.PUBLIC_GA_ID }}

      - name: Upload chmod Calculator test report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report-chmod
          path: playwright-report/
          retention-days: 7

      - name: Run gitignore Generator tests
        run: npm run test:gitignore
        env:
          PUBLIC_GA_ID: ${{ secrets.PUBLIC_GA_ID }}

      - name: Upload gitignore Generator test report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report-gitignore
          path: playwright-report/
          retention-days: 7

      - name: Run Docker Compose Converter tests
        run: npm run test:docker
        env:
          PUBLIC_GA_ID: ${{ secrets.PUBLIC_GA_ID }}

      - name: Upload Docker Compose Converter test report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report-docker
          path: playwright-report/
          retention-days: 7

      - name: Run JSON Diff tests
        run: npm run test:json-diff
        env:
          PUBLIC_GA_ID: ${{ secrets.PUBLIC_GA_ID }}

      - name: Upload JSON Diff test report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report-json-diff
          path: playwright-report/
          retention-days: 7

  # ─── Job 2: Build and deploy — only on push to master, only if tests pass ──
  deploy:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps
        env:
          npm_config_legacy_peer_deps: true

      - name: Build
        run: npm run build
        env:
          PUBLIC_GA_ID: ${{ secrets.PUBLIC_GA_ID }}

      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy dist --project-name opsbash
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
